{% extends 'base.html' %}

{% block title %}Criar nova senha | G Tech{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <span class="eyebrow">Acesso G Tech</span>

        <h1>Criar nova senha</h1>

        <p style="color: var(--muted); line-height: 1.7;">
            Escolha uma nova senha com pelo menos 8 caracteres.
        </p>

        <form method="post" class="form-grid">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field">
                <label>Nova senha</label>
                <input class="input" type="password" name="password" required minlength="8">
            </div>

            <div class="field">
                <label>Confirmar nova senha</label>
                <input class="input" type="password" name="password_confirm" required minlength="8">
            </div>

            <button class="btn-primary full" type="submit">
                Salvar nova senha
            </button>

            <a class="btn-secondary full" href="{{ url_for('auth.login') }}">
                Voltar para login
            </a>
        </form>
    </div>
</section>
{% endblock %}
