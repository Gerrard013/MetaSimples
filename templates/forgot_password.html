{% extends 'base.html' %}

{% block title %}Recuperar senha | G Tech{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <span class="eyebrow">Acesso G Tech</span>

        <h1>Recuperar senha</h1>

        <p style="color: var(--muted); line-height: 1.7;">
            Informe seu e-mail. Se existir uma conta cadastrada, enviaremos um link seguro para criar uma nova senha.
        </p>

        <form method="post" class="form-grid">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="field">
                <label>E-mail</label>
                <input class="input" type="email" name="email" placeholder="seuemail@email.com" required>
            </div>

            <button class="btn-primary full" type="submit">
                Enviar link de recuperação
            </button>

            <a class="btn-secondary full" href="{{ url_for('auth.login') }}">
                Voltar para login
            </a>
        </form>
    </div>
</section>
{% endblock %}
